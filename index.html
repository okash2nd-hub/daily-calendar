<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="日めくり" />
<meta name="theme-color" content="#eeede9" />
<title>日めくりカレンダー</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
  --text: #1a1a1a; --text2: #666660; --text3: #aaa9a3;
  --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
  --info-bg: #e6f1fb; --info-text: #185fa5;
  --success: #1d9e75;
  --radius: 8px; --radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
    --text: #f0f0ee; --text2: #aaa9a3; --text3: #666660;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    --info-bg: #0c447c; --info-text: #b5d4f4;
    --success: #5dcaa5;
  }
}
body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: var(--bg3); min-height: 100vh; padding: 1.5rem 1rem 4rem; color: var(--text); }
.app { max-width: 520px; margin: 0 auto; }

.calendar-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.card-top { background: var(--bg2); border-bottom: 0.5px solid var(--border); padding: 0.75rem 1.25rem; display: flex; justify-content: space-between; align-items: center; }
.month-year { font-size: 13px; color: var(--text2); font-weight: 500; letter-spacing: 0.05em; }
.nav-buttons { display: flex; gap: 8px; }
.nav-btn { background: none; border: 0.5px solid var(--border2); border-radius: var(--radius); width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 20px; line-height: 1; }
.nav-btn:active { background: var(--bg2); }

.card-body { padding: 1.25rem; display: flex; gap: 1.25rem; align-items: flex-start; }
.date-col { flex-shrink: 0; }
.date-number { font-size: 72px; font-weight: 500; line-height: 1; color: var(--text); }
.weekday { font-size: 12px; color: var(--text2); margin-top: 4px; }
.slot-badge { margin-top: 6px; font-size: 10px; font-weight: 600; background: var(--info-bg); color: var(--info-text); border-radius: 5px; padding: 2px 7px; display: inline-block; }
.divider { width: 0.5px; background: var(--border); align-self: stretch; flex-shrink: 0; }
.right-col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; padding-top: 2px; }
.display-title { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.4; }
.display-body { font-size: 13px; color: var(--text2); line-height: 1.7; white-space: pre-wrap; word-break: break-all; }
.content-empty { color: var(--text3); font-size: 13px; font-style: italic; }
.display-image-wrap { width: 100%; aspect-ratio: 1/1; border-radius: var(--radius); overflow: hidden; border: 0.5px solid var(--border); }
.display-image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

.nav-date-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
.nav-date-btn { flex: 1; padding: 12px 0; font-size: 15px; font-weight: 500; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); cursor: pointer; color: var(--text2); text-align: center; }
.nav-date-btn:active { background: var(--bg2); }
.nav-date-btn.today { background: var(--text); color: var(--bg); border-color: transparent; }

.install-banner { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px 14px; margin-bottom: 1.25rem; font-size: 13px; color: var(--text2); display: flex; align-items: flex-start; gap: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.install-banner-icon { font-size: 22px; flex-shrink: 0; }
.install-banner-close { margin-left: auto; background: none; border: none; font-size: 18px; color: var(--text3); cursor: pointer; padding: 0 0 0 8px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="app">
  <div class="install-banner" id="installBanner">
    <div class="install-banner-icon">📲</div>
    <div>ホーム画面に追加すると、アプリのように使えます。<br>（ブラウザのメニュー →「ホーム画面に追加」）</div>
    <button class="install-banner-close" onclick="dismissBanner()">✕</button>
  </div>

  <div class="calendar-card">
    <div class="card-top">
      <span class="month-year" id="monthYear"></span>
    </div>
    <div class="card-body">
      <div class="date-col">
        <div class="date-number" id="dateNum"></div>
        <div class="weekday" id="weekdayLabel"></div>
        <div class="slot-badge" id="slotBadge"></div>
      </div>
      <div class="divider"></div>
      <div class="right-col" id="rightCol"></div>
    </div>
  </div>

  <div class="nav-date-row">
    <button class="nav-date-btn" onclick="changeDay(-1)">‹ 前の日</button>
    <button class="nav-date-btn today" onclick="goToday()">今日</button>
    <button class="nav-date-btn" onclick="changeDay(1)">次の日 ›</button>
  </div>
</div>

function seededRand(seed) { let x = Math.sin(seed+1)*10000; return x - Math.floor(x); }
function getSlotForDay(d) {
  const seed = d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate();
  return Math.floor(seededRand(seed) * slots.length);
}

let current = new Date();
current.setHours(0,0,0,0);

function render() {
  const d = current;
  document.getElementById('monthYear').textContent = d.getFullYear() + '年 ' + MONTHS[d.getMonth()];
  document.getElementById('dateNum').textContent = d.getDate();
  document.getElementById('weekdayLabel').textContent = WEEKDAYS[d.getDay()];
  const idx = getSlotForDay(d);
  document.getElementById('slotBadge').textContent = 'カード ' + (idx + 1);
  const entry = slots[idx];
  const col = document.getElementById('rightCol');
  col.innerHTML = '';
  if (entry.title) { const t = document.createElement('div'); t.className = 'display-title'; t.textContent = entry.title; col.appendChild(t); }
  if (entry.body) { const b = document.createElement('div'); b.className = 'display-body'; b.textContent = entry.body; col.appendChild(b); }
  if (entry.image) {
    const wrap = document.createElement('div'); wrap.className = 'display-image-wrap';
    const img = document.createElement('img'); img.src = entry.image; img.alt = '';
    wrap.appendChild(img); col.appendChild(wrap);
  }
}

function changeDay(n) { current.setDate(current.getDate() + n); render(); }
function goToday() { current = new Date(); current.setHours(0,0,0,0); render(); }
function dismissBanner() { document.getElementById('installBanner').style.display = 'none'; localStorage.setItem('banner_dismissed','1'); }

if (localStorage.getItem('banner_dismissed')) document.getElementById('installBanner').style.display = 'none';
render();
</script>
